<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link rel="stylesheet" href="style.css">

<style>

.login-box{
width:300px;
margin:150px auto;
text-align:center;
}

input{
padding:10px;
margin:10px;
width:90%;
}

button{
padding:10px 20px;
background:#6c63ff;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>StudyHelper Login</h2>

<input type="text" id="username" placeholder="Enter username">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let username=document.getElementById("username").value;

if(username==""){
alert("Enter username");
return;
}

localStorage.setItem("user",username);

window.location="index.html";

}

</script>

</body>
</html>
