<!DOCTYPE html>
<html>

<head>

<title>Assignment Tracker</title>
<link rel="stylesheet" href="style.css">

<style>

.container{
max-width:600px;
margin:auto;
padding-top:80px;
text-align:center;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
padding:10px;
margin:6px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#6c63ff;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin:6px;
}

.assignment-list{
margin-top:20px;
}

.assignment{
background:#f5f5f5;
padding:12px;
margin:8px 0;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.delete-btn{
background:#ff4d4d;
padding:6px 10px;
}

</style>

</head>

<body>

<div class="container">

<h1>📚 Assignment Tracker</h1>

<div class="card">

<input id="title" placeholder="Assignment name">

<br>

<input id="date" type="date">

<input id="time" type="time">

<br>

<button onclick="addAssignment()">Add Assignment</button>

<div id="list" class="assignment-list"></div>

</div>

<br>

<a href="index.html">← Back to Home</a>

</div>

<script>

let assignments = JSON.parse(localStorage.getItem("deadlines")) || [];

function saveAssignments(){
localStorage.setItem("deadlines", JSON.stringify(assignments));
}

function addAssignment(){

let title = document.getElementById("title").value;
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;

if(title=="" || date=="" || time=="") return;

assignments.push({
title:title,
date:date,
time:time
});

saveAssignments();

displayAssignments();

document.getElementById("title").value="";
document.getElementById("date").value="";
document.getElementById("time").value="";

}

function deleteAssignment(index){

assignments.splice(index,1);

saveAssignments();

displayAssignments();

}

function displayAssignments(){

let list = document.getElementById("list");

list.innerHTML="";

assignments.forEach((a,index)=>{

let div = document.createElement("div");

div.className="assignment";

div.innerHTML=`

<div>
<strong>${a.title}</strong><br>
Due: ${a.date} – ${a.time}
</div>

<button class="delete-btn" onclick="deleteAssignment(${index})">
Delete
</button>

`;

list.appendChild(div);

});

}

displayAssignments();

</script>

</body>
</html>
